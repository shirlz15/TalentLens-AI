<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Candidate Comparison - TalentLens AI</title>
<meta name="description" content="Side-by-side comparison of two candidates with radar chart, score bars, skill overlap, and risk analysis."/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
.cmp-page { padding: 40px 0 80px; }
.cand-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.cand-pick {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg-card);
  cursor: pointer; transition: var(--transition); font-size: 13px;
}
.cand-pick:hover { border-color: var(--border-glow); background: var(--bg-card-hover); }
.cand-pick.selected-a { border-color: var(--purple); background: rgba(139,92,246,0.1); }
.cand-pick.selected-b { border-color: var(--electric); background: rgba(6,182,212,0.1); }
.cand-pick.disabled { opacity:.38; cursor:not-allowed; filter:saturate(.4); }
.cmp-header {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px;
  align-items: center; margin-bottom: 32px;
}
.cmp-header .vs { font-family:'Space Grotesk',sans-serif; font-size: 24px; font-weight: 800; color: var(--text-muted); text-align: center; }
.cmp-candidate {
  padding: 28px; border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px;
}
.cmp-name { font-family:'Space Grotesk',sans-serif; font-size: 18px; font-weight: 700; }
.cmp-role { font-size: 13px; color: var(--text-muted); }
.cmp-table { width: 100%; }
.cmp-row {
  display: grid; grid-template-columns: 1fr 140px 1fr; gap: 16px;
  padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  align-items: center;
}
.cmp-row:last-child { border-bottom: none; }
.cmp-row .cmp-label { text-align: center; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing:.06em; font-weight: 600; }
.cmp-row .cmp-val-a { text-align: right; }
.cmp-row .cmp-val-b { text-align: left; }
.cmp-score { font-family:'Space Grotesk',sans-serif; font-size: 22px; font-weight: 800; }
.cmp-bar-a { display: flex; justify-content: flex-end; }
.cmp-bar-b { display: flex; justify-content: flex-start; }
.bar-fill { height: 6px; border-radius: 99px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }
.skill-overlap { display: flex; gap: 16px; }
.skill-col { flex: 1; }
.skill-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing:.07em; margin-bottom: 10px; }
.skill-a { color: var(--purple); }
.skill-b { color: var(--electric); }
.skill-shared { color: var(--green); }
.intel-list { display:flex; flex-direction:column; gap:10px; }
.intel-pill { padding:12px 14px; border:1px solid var(--border); border-radius:12px; background:rgba(255,255,255,0.03); color:var(--text-secondary); font-size:13px; line-height:1.55; }
.radar-wrap { display: flex; justify-content: center; align-items: center; height: 340px; }
@media(max-width:768px) {
  .cmp-header { grid-template-columns: 1fr; }
  .cmp-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="page-overlay page-wrapper">
  <div id="navPlaceholder"></div>
  <div class="container cmp-page">
    <div class="section-header animate-slide-up">
      <div class="section-label">Comparison View</div>
      <h1 class="section-title">Candidate <span>Comparison</span></h1>
      <p class="section-subtitle">Select two candidates for a deep side-by-side intelligence comparison.</p>
    </div>

    <div class="glass" style="padding:20px;margin-bottom:24px;" class="animate-slide-up delay-1">
      <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;">
        <div style="flex:1;min-width:200px;">
          <div style="font-size:11px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Candidate A</div>
          <div class="cand-selector" id="selectorA"></div>
        </div>
        <div style="flex:1;min-width:200px;">
          <div style="font-size:11px;font-weight:600;color:var(--electric);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Candidate B</div>
          <div class="cand-selector" id="selectorB"></div>
        </div>
      </div>
    </div>

    <div id="comparisonView"></div>
  </div>
  <div id="footerPlaceholder"></div>
</div>

<script src="app.js"></script>
<script>
document.getElementById('navPlaceholder').innerHTML = buildNav('comparison.html');
document.getElementById('footerPlaceholder').innerHTML = buildFooter();
initNetworkCanvas();

const params = new URLSearchParams(location.search);
const compareCandidates = getRankedCandidatesForActiveSearch();
let idA = params.get('a') || compareCandidates[0]?.id || null;
let idB = params.get('b') || null;
let radarChart = null;
let sameSelectionWarning = params.has('a') && params.has('b') && params.get('a') === params.get('b');

function getNextCandidateId(excludeId) {
  return (compareCandidates.find(candidate => String(candidate.id) !== String(excludeId)) || compareCandidates[0] || {}).id || null;
}

if (!idB) idB = getNextCandidateId(idA);
if (!compareCandidates.some(candidate => String(candidate.id) === String(idA))) idA = compareCandidates[0]?.id || null;
if (!idB || !compareCandidates.some(candidate => String(candidate.id) === String(idB))) idB = getNextCandidateId(idA);

function renderEmptyComparison(title, message) {
  if (radarChart) { radarChart.destroy(); radarChart = null; }
  document.getElementById('comparisonView').innerHTML = `
    <div class="glass" style="padding:32px;text-align:center;border-color:rgba(245,158,11,.35);">
      <div class="section-label" style="justify-content:center;">Comparison</div>
      <h2 style="font-family:'Space Grotesk',sans-serif;margin:10px 0 8px;">${title}</h2>
      <p style="color:var(--text-secondary);">${message}</p>
    </div>`;
}

function buildSelectors() {
  const selectorA = document.getElementById('selectorA');
  const selectorB = document.getElementById('selectorB');
  selectorA.innerHTML = '';
  selectorB.innerHTML = '';
  if (!compareCandidates.length) {
    renderEmptyComparison('No ranked candidates yet.', 'Run Analyze Candidates from Analyze Role to populate backend ranking results before using Compare.');
    return;
  }
  compareCandidates.forEach(candidate => {
    ['A', 'B'].forEach(side => {
      const disabled = (side === 'A' && String(candidate.id) === String(idB)) || (side === 'B' && String(candidate.id) === String(idA));
      const element = document.createElement('div');
      element.className = `cand-pick${side === 'A' && String(candidate.id) === String(idA) ? ' selected-a' : side === 'B' && String(candidate.id) === String(idB) ? ' selected-b' : ''}${disabled ? ' disabled' : ''}`;
      element.innerHTML = `<div class="avatar avatar-sm" style="background:${candidate.gradient};">${candidate.initials}</div><span>${candidate.name}</span>`;
      element.onclick = () => {
        if (disabled) return;
        if (side === 'A') {
          idA = candidate.id;
          sameSelectionWarning = false;
          if (!idB || String(idB) === String(idA)) idB = getNextCandidateId(idA);
        } else {
          idB = candidate.id;
          sameSelectionWarning = false;
        }
        buildSelectors();
        renderComparison();
      };
      (side === 'A' ? selectorA : selectorB).appendChild(element);
    });
  });
}

async function renderComparison() {
  const selectedA = compareCandidates.find(candidate => String(candidate.id) === String(idA)) || compareCandidates[0];
  const selectedB = compareCandidates.find(candidate => String(candidate.id) === String(idB)) || compareCandidates[1] || compareCandidates[0];
  if (!selectedA || !selectedB) {
    renderEmptyComparison('No ranked candidates yet.', 'Run Analyze Candidates from Analyze Role to populate backend ranking results before using Compare.');
    return;
  }
  if (String(selectedA.id) === String(selectedB.id) || sameSelectionWarning) {
    renderEmptyComparison('Please select two different candidates.', 'TalentLens comparisons require two unique candidate profiles.');
    return;
  }

  document.getElementById('comparisonView').innerHTML = `
    <div class="glass" style="padding:32px;text-align:center;">
      <div class="section-label" style="justify-content:center;">Comparison</div>
      <p style="color:var(--text-secondary);">Loading backend comparison...</p>
    </div>`;

  let candidateA = selectedA;
  let candidateB = selectedB;
  try {
    const payload = await compareCandidatesWithBackend(idA, idB);
    candidateA = payload.candidate_a;
    candidateB = payload.candidate_b;
    refreshBackendStatus(true);
  } catch (error) {
    renderEmptyComparison('Comparison unavailable.', error.message || 'Unable to compare candidates right now.');
    return;
  }

  const sharedSkills = (candidateA.skills || []).filter(skill => (candidateB.skills || []).includes(skill));
  const onlyA = (candidateA.skills || []).filter(skill => !(candidateB.skills || []).includes(skill));
  const onlyB = (candidateB.skills || []).filter(skill => !(candidateA.skills || []).includes(skill));
  const hiringConfidenceA = getHiringConfidence(candidateA);
  const hiringConfidenceB = getHiringConfidence(candidateB);
  const hiddenGemScoreA = getHiddenGemScore(candidateA);
  const hiddenGemScoreB = getHiddenGemScore(candidateB);
  const recommendationA = `${getRecruiterDecision(candidateA)} (${getConfidenceLevel(hiringConfidenceA)} confidence)`;
  const recommendationB = `${getRecruiterDecision(candidateB)} (${getConfidenceLevel(hiringConfidenceB)} confidence)`;
  const dimensions = [
    ['Final Score', candidateA.finalScore, candidateB.finalScore],
    ['Technical', candidateA.technicalScore, candidateB.technicalScore],
    ['Experience', candidateA.experienceScore, candidateB.experienceScore],
    ['Behavioral', candidateA.behavioralScore, candidateB.behavioralScore],
    ['Authenticity', candidateA.authenticityScore, candidateB.authenticityScore],
    ['Cognitive Twin', candidateA.cognitiveTwinScore, candidateB.cognitiveTwinScore],
    ['Career Consistency', candidateA.careerConsistency, candidateB.careerConsistency],
    ['Growth Potential', candidateA.growthPotential, candidateB.growthPotential],
    ['Recruiter Score', hiringConfidenceA, hiringConfidenceB],
    ['Hidden Gem Score', hiddenGemScoreA, hiddenGemScoreB],
  ];

  function winnerStyle(valueA, valueB, side) {
    if (side === 'a') return valueA > valueB ? 'color:var(--purple);font-weight:800;' : 'color:var(--text-secondary);';
    return valueB > valueA ? 'color:var(--electric);font-weight:800;' : 'color:var(--text-secondary);';
  }

  document.getElementById('comparisonView').innerHTML = `
    <div class="glass" style="padding:28px;margin-bottom:24px;">
      <div class="cmp-header">
        <div class="cmp-candidate" style="background:rgba(139,92,246,0.06);border:1px solid rgba(139,92,246,0.2);border-radius:var(--radius);">
          <div class="avatar avatar-lg" style="background:${candidateA.gradient};">${candidateA.initials}</div>
          <div class="cmp-name">${candidateA.name}</div>
          <div class="cmp-role">${getCandidateHeadline(candidateA)}</div>
          <div class="cmp-role">${getCandidateOrganization(candidateA)} - ${getCandidateExperienceSummary(candidateA)}</div>
          <div class="cmp-role">${getCandidateEducationSummary(candidateA) || 'Candidate Profile'}</div>
          ${candidateA.hiddenGem ? '<div class="gem-badge">Hidden Gem</div>' : ''}
          <div style="color:${getScoreColor(candidateA.finalScore)};font-family:Space Grotesk;font-size:36px;font-weight:800;">${candidateA.finalScore}</div>
          <div style="font-size:11px;color:var(--text-muted);">Final Score</div>
        </div>
        <div class="vs">VS</div>
        <div class="cmp-candidate" style="background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.2);border-radius:var(--radius);">
          <div class="avatar avatar-lg" style="background:${candidateB.gradient};">${candidateB.initials}</div>
          <div class="cmp-name">${candidateB.name}</div>
          <div class="cmp-role">${getCandidateHeadline(candidateB)}</div>
          <div class="cmp-role">${getCandidateOrganization(candidateB)} - ${getCandidateExperienceSummary(candidateB)}</div>
          <div class="cmp-role">${getCandidateEducationSummary(candidateB) || 'Candidate Profile'}</div>
          ${candidateB.hiddenGem ? '<div class="gem-badge">Hidden Gem</div>' : ''}
          <div style="color:${getScoreColor(candidateB.finalScore)};font-family:Space Grotesk;font-size:36px;font-weight:800;">${candidateB.finalScore}</div>
          <div style="font-size:11px;color:var(--text-muted);">Final Score</div>
        </div>
      </div>
    </div>

    <div class="glass" style="padding:24px;margin-bottom:24px;">
      <div class="cmp-table">
        <div class="cmp-row">
          <div class="cmp-val-a" style="text-align:right;color:var(--text-secondary);">${getCandidateEducationSummary(candidateA) || 'Candidate Profile'}</div>
          <div class="cmp-label">Education</div>
          <div class="cmp-val-b" style="text-align:left;color:var(--text-secondary);">${getCandidateEducationSummary(candidateB) || 'Candidate Profile'}</div>
        </div>
        <div class="cmp-row">
          <div class="cmp-val-a" style="text-align:right;color:var(--text-secondary);">${getCandidateExperienceSummary(candidateA)}</div>
          <div class="cmp-label">Experience</div>
          <div class="cmp-val-b" style="text-align:left;color:var(--text-secondary);">${getCandidateExperienceSummary(candidateB)}</div>
        </div>
        <div class="cmp-row">
          <div class="cmp-val-a" style="text-align:right;color:var(--text-secondary);">${candidateA.careerConsistency}</div>
          <div class="cmp-label">Career Consistency</div>
          <div class="cmp-val-b" style="text-align:left;color:var(--text-secondary);">${candidateB.careerConsistency}</div>
        </div>
        <div class="cmp-row">
          <div class="cmp-val-a" style="text-align:right;color:var(--text-secondary);">${recommendationA}</div>
          <div class="cmp-label">Recommendation</div>
          <div class="cmp-val-b" style="text-align:left;color:var(--text-secondary);">${recommendationB}</div>
        </div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:24px;align-items:start;">
      <div class="glass" style="padding:28px;">
        <h3 style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;">Radar Comparison</h3>
        <div class="radar-wrap"><canvas id="radarChart"></canvas></div>
      </div>
      <div class="glass" style="padding:28px;">
        <h3 style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;">Score Breakdown</h3>
        <div class="cmp-table">
          ${dimensions.map(([label, valueA, valueB]) => `
            <div class="cmp-row">
              <div class="cmp-val-a">
                <div class="cmp-score" style="${winnerStyle(valueA, valueB, 'a')}">${valueA}</div>
                <div class="cmp-bar-a"><div style="width:${valueA}px;max-width:80px;"><div class="bar-fill" style="background:var(--purple);width:${valueA}%;max-width:80px;"></div></div></div>
              </div>
              <div class="cmp-label">${label}</div>
              <div class="cmp-val-b">
                <div class="cmp-score" style="${winnerStyle(valueA, valueB, 'b')}">${valueB}</div>
                <div class="cmp-bar-b"><div style="width:${valueB}px;max-width:80px;"><div class="bar-fill" style="background:var(--electric);width:${valueB}%;max-width:80px;"></div></div></div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="glass" style="padding:28px;margin-bottom:24px;">
      <h3 style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:20px;">Skill Overlap Analysis</h3>
      <div class="skill-overlap">
        <div class="skill-col">
          <div class="skill-col-title skill-a">Only ${candidateA.name.split(' ')[0]}</div>
          ${onlyA.map(skill => `<div class="tag tag-skill" style="display:block;margin:4px 0;">${skill}</div>`).join('')}
        </div>
        <div class="skill-col">
          <div class="skill-col-title skill-shared">Shared Skills</div>
          ${sharedSkills.map(skill => `<div class="tag" style="background:rgba(16,185,129,0.12);color:#6ee7b7;border:1px solid rgba(16,185,129,0.25);display:block;margin:4px 0;">${skill}</div>`).join('')}
          ${sharedSkills.length === 0 ? '<span style="font-size:13px;color:var(--text-muted);">No overlap</span>' : ''}
        </div>
        <div class="skill-col">
          <div class="skill-col-title skill-b">Only ${candidateB.name.split(' ')[0]}</div>
          ${onlyB.map(skill => `<div class="tag" style="background:rgba(6,182,212,0.12);color:#67e8f9;border:1px solid rgba(6,182,212,0.25);display:block;margin:4px 0;">${skill}</div>`).join('')}
        </div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:24px;">
      <div class="glass" style="padding:24px;">
        <h3 style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:12px;">${candidateA.name.split(' ')[0]} Risk Profile</h3>
        <div class="insight-box ${candidateA.riskLevel === 'Low' ? 'green' : 'amber'}" style="margin:0;">
          <div class="ib-label">${candidateA.riskLevel} Risk</div>
          <p class="ib-text">${candidateA.authenticityRisk}</p>
        </div>
      </div>
      <div class="glass" style="padding:24px;">
        <h3 style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:12px;">${candidateB.name.split(' ')[0]} Risk Profile</h3>
        <div class="insight-box ${candidateB.riskLevel === 'Low' ? 'green' : 'amber'}" style="margin:0;">
          <div class="ib-label">${candidateB.riskLevel} Risk</div>
          <p class="ib-text">${candidateB.authenticityRisk}</p>
        </div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:24px;align-items:start;">
      <div class="glass" style="padding:24px;">
        <h3 style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:12px;">${candidateA.name.split(' ')[0]} strengths</h3>
        <div class="intel-list">${(candidateA.strengths || []).map(item => `<div class="intel-pill">${item}</div>`).join('') || '<div class="intel-pill">No structured strengths available.</div>'}</div>
        <h3 style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin:20px 0 12px;">${candidateA.name.split(' ')[0]} weaknesses</h3>
        <div class="intel-list">${(candidateA.weaknesses || []).map(item => `<div class="intel-pill">${item}</div>`).join('') || '<div class="intel-pill">No structured weaknesses available.</div>'}</div>
      </div>
      <div class="glass" style="padding:24px;">
        <h3 style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:12px;">${candidateB.name.split(' ')[0]} strengths</h3>
        <div class="intel-list">${(candidateB.strengths || []).map(item => `<div class="intel-pill">${item}</div>`).join('') || '<div class="intel-pill">No structured strengths available.</div>'}</div>
        <h3 style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin:20px 0 12px;">${candidateB.name.split(' ')[0]} weaknesses</h3>
        <div class="intel-list">${(candidateB.weaknesses || []).map(item => `<div class="intel-pill">${item}</div>`).join('') || '<div class="intel-pill">No structured weaknesses available.</div>'}</div>
      </div>
    </div>`;

  if (radarChart) { radarChart.destroy(); }
  const ctx = document.getElementById('radarChart').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['Technical', 'Experience', 'Behavioral', 'Authenticity', 'Cognitive Twin', 'Growth'],
      datasets: [
        { label: candidateA.name.split(' ')[0], data: [candidateA.technicalScore, candidateA.experienceScore, candidateA.behavioralScore, candidateA.authenticityScore, candidateA.cognitiveTwinScore, candidateA.growthPotential], backgroundColor: 'rgba(139,92,246,0.15)', borderColor: '#8b5cf6', pointBackgroundColor: '#8b5cf6', borderWidth: 2 },
        { label: candidateB.name.split(' ')[0], data: [candidateB.technicalScore, candidateB.experienceScore, candidateB.behavioralScore, candidateB.authenticityScore, candidateB.cognitiveTwinScore, candidateB.growthPotential], backgroundColor: 'rgba(6,182,212,0.15)', borderColor: '#06b6d4', pointBackgroundColor: '#06b6d4', borderWidth: 2 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: { r: { min: 50, max: 100, ticks: { color: '#475569', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.06)' }, pointLabels: { color: '#94a3b8', font: { size: 11, family: 'Inter' } }, angleLines: { color: 'rgba(255,255,255,0.06)' } } },
      plugins: { legend: { labels: { color: '#94a3b8', font: { family: 'Inter', size: 12 } } } }
    }
  });
}

buildSelectors();
renderComparison();
</script>
</body>
</html>
