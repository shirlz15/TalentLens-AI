<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Candidate Rankings - TalentLens AI</title>
<meta name="description" content="AI-ranked candidates from the stored TalentLens database."/>
<link rel="stylesheet" href="styles.css?v=ranking-export"/>
<style>
.rank-page { padding: 40px 0 80px; }
.summary-bar { display:flex; gap:16px; flex-wrap:wrap; padding:20px 24px; margin-bottom:24px; }
.summary-item { text-align:center; flex:1; min-width:100px; }
.summary-item .s-val { font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; }
.summary-item .s-lab { font-size:11px; color:var(--text-muted); }
.score-pill { display:inline-flex; padding:4px 10px; border-radius:8px; font-size:13px; font-weight:800; font-family:'Space Grotesk',sans-serif; }
.score-pill.high { background:rgba(16,185,129,.15); color:var(--green); }
.score-pill.mid { background:rgba(99,102,241,.15); color:#a5b4fc; }
.score-pill.low { background:rgba(245,158,11,.15); color:var(--amber); }
.rank-badge { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;font-family:'Space Grotesk',sans-serif;background:rgba(255,255,255,.08);color:var(--text-secondary); }
.rank-badge.top { background:linear-gradient(135deg,#f59e0b,#d97706); color:#1a0f00; }
.table-wrapper { overflow-x:auto; }
.filter-toggle-gem { padding:8px 16px;border-radius:8px;border:1px solid rgba(245,158,11,.3);background:rgba(245,158,11,.08);color:#fbbf24;font-size:13px;font-weight:600;cursor:pointer; }
.filter-toggle-gem.active { background:rgba(245,158,11,.18); }
.sidebar-overlay { position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;display:none;backdrop-filter:blur(4px); }
.sidebar-overlay.open { display:flex;justify-content:flex-end; }
.detail-sidebar { width:460px;max-width:100%;height:100%;overflow-y:auto;background:#0d1224;border-left:1px solid var(--border);padding:32px 28px; }
.sidebar-close { width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;margin-bottom:24px; }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="page-overlay page-wrapper">
  <div id="navPlaceholder"></div>
  <main class="container rank-page">
    <div class="section-header animate-slide-up">
      <div class="section-label">Stored Database Ranking</div>
      <h1 class="section-title">Candidate <span>Rankings</span></h1>
      <p class="section-subtitle" id="dashboardSubtitle">AI-ranked candidates from the TalentLens database.</p>
    </div>

    <div class="glass summary-bar animate-slide-up delay-1">
      <div class="summary-item"><div class="s-val" id="sumTotal" style="color:var(--green)">0</div><div class="s-lab">Ranked Profiles</div></div>
      <div class="summary-item"><div class="s-val" id="sumAvg" style="background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">0</div><div class="s-lab">Avg Score</div></div>
      <div class="summary-item"><div class="s-val" id="sumGems" style="color:#fbbf24">0</div><div class="s-lab">Hidden Gems</div></div>
      <div class="summary-item"><div class="s-val" id="sumUserAdded" style="color:var(--electric)">0</div><div class="s-lab">User Added</div></div>
      <div class="summary-item"><div class="s-val" id="sumTop" style="color:var(--purple)">0</div><div class="s-lab">Top Score</div></div>
    </div>

    <div class="glass filter-bar animate-slide-up delay-2">
      <div class="search-wrap"><span class="search-icon">Search</span><input type="text" id="searchInput" class="search-input" placeholder="Search candidates..." oninput="filterCandidates()"/></div>
      <select id="filterSkill" class="filter-select" data-custom-dropdown="Skills" onchange="filterCandidates()"></select>
      <select id="filterSource" class="filter-select" data-custom-dropdown="Source" onchange="filterCandidates()">
        <option value="">All Sources</option>
        <option value="Built-In">Built-In</option>
        <option value="User Added">User Added</option>
      </select>
      <select id="filterExp" class="filter-select" data-custom-dropdown="Experience" onchange="filterCandidates()">
        <option value="">Any Experience</option>
        <option value="0-4">0-4 years</option>
        <option value="4-7">4-7 years</option>
        <option value="7+">7+ years</option>
      </select>
      <button class="filter-toggle-gem" id="gemToggle" onclick="toggleGemFilter()">Hidden Gems Only</button>
    </div>

    <div class="glass animate-slide-up delay-3">
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Rank</th><th>Candidate</th><th>Profile Evidence</th><th>Final</th><th>Technical</th><th>Experience</th><th>Cognitive Twin</th><th>Source</th><th>Match Evidence</th><th></th>
            </tr>
          </thead>
          <tbody id="candidateTableBody"></tbody>
        </table>
      </div>
      <div class="ranking-export-actions">
        <button type="button" id="exportRankingsBtn" class="btn export-ranked-btn" onclick="handleRankingsExport()">
          <span class="export-download-icon" aria-hidden="true">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <path d="M12 3v11m0 0 4-4m-4 4-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="export-spinner" aria-hidden="true"></span>
          <span class="export-button-label">📊 Export Ranked Candidates (.xlsx)</span>
        </button>
      </div>
    </div>
  </main>
  <div id="footerPlaceholder"></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar(event)">
  <div class="detail-sidebar">
    <button class="sidebar-close" onclick="document.getElementById('sidebarOverlay').classList.remove('open')">x</button>
    <div id="sidebarContent"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
document.getElementById('navPlaceholder').innerHTML = buildNav('dashboard.html');
document.getElementById('footerPlaceholder').innerHTML = buildFooter();
initNetworkCanvas();

let gemOnly = false;
let activeRankings = getRankedCandidatesForActiveSearch();
let sheetJsLoadPromise = null;

const SHEETJS_EXPORT_URLS = [
  'https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'
];
const RANKING_EXPORT_COLUMNS = [
  'Rank',
  'Candidate ID',
  'Candidate Name',
  'Current Role',
  'Experience',
  'Final Score',
  'Technical Score',
  'Experience Score',
  'Semantic Score',
  'Behavioral Score',
  'Authenticity Score',
  'Cognitive Twin Score',
  'Hidden Gem (Yes/No)',
  'Matched Skills',
  'Missing Skills',
  'Strengths',
  'Weaknesses',
  'Recommendation',
  'Why Ranked'
];

function scorePill(score) {
  const cls = score >= 88 ? 'high' : score >= 75 ? 'mid' : 'low';
  return `<span class="score-pill ${cls}">${score}</span>`;
}

function updateSummary(data) {
  const search = getTalentSearch();
  document.getElementById('dashboardSubtitle').innerHTML = data.length
    ? `Ranking <strong style="color:var(--text-primary)">${search.title || 'Selected Role'}</strong> from backend-ranked TalentLens candidates.`
    : `No backend ranking results yet for <strong style="color:var(--text-primary)">${search.title || 'Selected Role'}</strong>. Run Analyze Candidates first.`;
  document.getElementById('sumTotal').textContent = data.length;
  document.getElementById('sumAvg').textContent = data.length ? (data.reduce((s,c)=>s+c.finalScore,0)/data.length).toFixed(1) : '0';
  document.getElementById('sumGems').textContent = data.filter(c => c.hiddenGem).length;
  document.getElementById('sumUserAdded').textContent = data.filter(c => c.source === 'User Added').length;
  document.getElementById('sumTop').textContent = data[0]?.finalScore || 0;
}

function populateSkillFilter() {
  const skills = [...new Set(activeRankings.flatMap(c => c.skills || []))].sort();
  document.getElementById('filterSkill').innerHTML = `<option value="">All Skills</option>` + skills.map(s => `<option>${s}</option>`).join('');
}

function initCustomFilterDropdowns() {
  ['filterSkill', 'filterSource', 'filterExp'].forEach(createOrRefreshCustomFilterDropdown);
  if (window.__talentlensFilterDropdownsBound) return;
  document.addEventListener('click', event => {
    if (!event.target.closest('.custom-filter-dropdown')) closeCustomFilterDropdowns();
  });
  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') closeCustomFilterDropdowns(true);
  });
  window.__talentlensFilterDropdownsBound = true;
}

function createOrRefreshCustomFilterDropdown(selectId) {
  const select = document.getElementById(selectId);
  if (!select) return;

  select.classList.add('is-native-hidden');
  select.setAttribute('aria-hidden', 'true');
  select.tabIndex = -1;

  let dropdown = document.querySelector(`[data-filter-dropdown-for="${selectId}"]`);
  if (!dropdown) {
    dropdown = document.createElement('div');
    dropdown.className = 'custom-filter-dropdown';
    dropdown.dataset.filterDropdownFor = selectId;
    select.insertAdjacentElement('afterend', dropdown);
  }

  const buttonId = `${selectId}CustomButton`;
  const menuId = `${selectId}CustomMenu`;
  const selectedOption = select.options[select.selectedIndex] || select.options[0];
  const selectedLabel = selectedOption ? selectedOption.textContent : select.dataset.customDropdown || 'Filter';
  const options = Array.from(select.options);

  dropdown.innerHTML = `
    <button type="button" class="custom-filter-button" id="${buttonId}" aria-haspopup="listbox" aria-expanded="false" aria-controls="${menuId}">
      <span class="custom-filter-label">${escapeFilterDropdownText(selectedLabel)}</span>
    </button>
    <div class="custom-filter-menu" id="${menuId}" role="listbox" aria-labelledby="${buttonId}">
      ${options.map((option, index) => `
        <button type="button"
          class="custom-filter-option${option.value === select.value ? ' is-selected' : ''}"
          role="option"
          aria-selected="${option.value === select.value ? 'true' : 'false'}"
          data-value="${escapeFilterDropdownAttribute(option.value)}"
          data-index="${index}"
          tabindex="-1">${escapeFilterDropdownText(option.textContent)}</button>
      `).join('')}
    </div>
  `;

  const button = dropdown.querySelector('.custom-filter-button');
  const optionButtons = dropdown.querySelectorAll('.custom-filter-option');
  button.addEventListener('click', event => {
    event.stopPropagation();
    toggleCustomFilterDropdown(dropdown, false);
  });
  button.addEventListener('keydown', event => handleCustomFilterButtonKeydown(event, dropdown));
  optionButtons.forEach(optionButton => {
    optionButton.addEventListener('click', event => {
      event.stopPropagation();
      selectCustomFilterOption(dropdown, optionButton);
    });
    optionButton.addEventListener('keydown', event => handleCustomFilterOptionKeydown(event, dropdown));
  });

  if (!select.dataset.customDropdownBound) {
    select.addEventListener('change', () => createOrRefreshCustomFilterDropdown(selectId));
    select.dataset.customDropdownBound = 'true';
  }
}

function toggleCustomFilterDropdown(dropdown, focusSelected) {
  if (dropdown.classList.contains('is-open')) {
    closeCustomFilterDropdown(dropdown, false);
    return;
  }
  openCustomFilterDropdown(dropdown, focusSelected);
}

function openCustomFilterDropdown(dropdown, focusSelected = false) {
  closeCustomFilterDropdowns();
  dropdown.classList.add('is-open');
  dropdown.querySelector('.custom-filter-button').setAttribute('aria-expanded', 'true');
  if (focusSelected) {
    const selected = dropdown.querySelector('.custom-filter-option.is-selected') || dropdown.querySelector('.custom-filter-option');
    if (selected) selected.focus();
  }
}

function closeCustomFilterDropdown(dropdown, returnFocus = false) {
  if (!dropdown) return;
  dropdown.classList.remove('is-open');
  const button = dropdown.querySelector('.custom-filter-button');
  if (button) {
    button.setAttribute('aria-expanded', 'false');
    if (returnFocus) button.focus();
  }
}

function closeCustomFilterDropdowns(returnFocus = false) {
  document.querySelectorAll('.custom-filter-dropdown.is-open').forEach(dropdown => {
    closeCustomFilterDropdown(dropdown, returnFocus);
  });
}

function selectCustomFilterOption(dropdown, optionButton) {
  const select = document.getElementById(dropdown.dataset.filterDropdownFor);
  if (!select) return;
  select.value = optionButton.dataset.value || '';
  select.dispatchEvent(new Event('change', { bubbles: true }));
  closeCustomFilterDropdown(dropdown, true);
}

function handleCustomFilterButtonKeydown(event, dropdown) {
  if (!['Enter', ' ', 'ArrowDown', 'ArrowUp'].includes(event.key)) return;
  event.preventDefault();
  openCustomFilterDropdown(dropdown, true);
  if (event.key === 'ArrowUp') {
    const options = Array.from(dropdown.querySelectorAll('.custom-filter-option'));
    const target = options[options.length - 1];
    if (target) target.focus();
  }
}

function handleCustomFilterOptionKeydown(event, dropdown) {
  const options = Array.from(dropdown.querySelectorAll('.custom-filter-option'));
  const currentIndex = options.indexOf(document.activeElement);
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    options[(currentIndex + 1) % options.length]?.focus();
  } else if (event.key === 'ArrowUp') {
    event.preventDefault();
    options[(currentIndex - 1 + options.length) % options.length]?.focus();
  } else if (event.key === 'Home') {
    event.preventDefault();
    options[0]?.focus();
  } else if (event.key === 'End') {
    event.preventDefault();
    options[options.length - 1]?.focus();
  } else if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    selectCustomFilterOption(dropdown, document.activeElement);
  } else if (event.key === 'Escape') {
    event.preventDefault();
    closeCustomFilterDropdown(dropdown, true);
  }
}

function escapeFilterDropdownText(value) {
  return String(value || '').replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  })[char]);
}

function escapeFilterDropdownAttribute(value) {
  return escapeFilterDropdownText(value).replace(/`/g, '&#96;');
}

async function handleRankingsExport() {
  const rankings = getRankingsForExport();
  if (!rankings.length) {
    showTalentLensToast('No ranking results available.\nPlease analyze candidates first.', 'warning');
    return;
  }

  setRankingsExportLoading(true);
  try {
    await waitForExportFrame();
    await ensureSheetJsAvailable();
    const workbook = await createRankingsWorkbook(rankings);
    const filename = `TalentLens_AI_Ranked_Candidates_${getExportDateStamp()}.xlsx`;
    await waitForExportFrame();
    XLSX.writeFile(workbook, filename, { compression: true });
    showTalentLensToast('Ranked candidates exported successfully.', 'success');
  } catch (error) {
    console.error('TalentLens export failed:', error);
    showTalentLensToast('Unable to export ranked candidates. Please try again.', 'error');
  } finally {
    setRankingsExportLoading(false);
  }
}

function getRankingsForExport() {
  return Array.isArray(activeRankings) ? activeRankings : [];
}

function setRankingsExportLoading(isLoading) {
  const button = document.getElementById('exportRankingsBtn');
  if (!button) return;
  button.classList.toggle('is-loading', isLoading);
  button.disabled = isLoading;
  button.setAttribute('aria-busy', String(isLoading));
}

function ensureSheetJsAvailable() {
  if (window.XLSX && window.XLSX.utils && typeof window.XLSX.writeFile === 'function') {
    return Promise.resolve(window.XLSX);
  }
  if (sheetJsLoadPromise) return sheetJsLoadPromise;

  sheetJsLoadPromise = new Promise((resolve, reject) => {
    const existingScript = document.querySelector('script[data-talentlens-sheetjs]');
    if (existingScript) {
      existingScript.addEventListener('load', () => resolve(window.XLSX), { once: true });
      existingScript.addEventListener('error', () => reject(new Error('SheetJS failed to load.')), { once: true });
      return;
    }

    loadSheetJsScript(SHEETJS_EXPORT_URLS, resolve, reject);
  });

  return sheetJsLoadPromise;
}

function loadSheetJsScript(urls, resolve, reject) {
  const [url, ...fallbackUrls] = urls;
  if (!url) {
    reject(new Error('SheetJS failed to load.'));
    return;
  }

  const script = document.createElement('script');
  script.src = url;
  script.async = true;
  script.dataset.talentlensSheetjs = 'true';
  script.onload = () => {
    if (window.XLSX && window.XLSX.utils && typeof window.XLSX.writeFile === 'function') {
      resolve(window.XLSX);
    } else {
      script.remove();
      loadSheetJsScript(fallbackUrls, resolve, reject);
    }
  };
  script.onerror = () => {
    script.remove();
    loadSheetJsScript(fallbackUrls, resolve, reject);
  };
  document.head.appendChild(script);
}

async function createRankingsWorkbook(candidates) {
  const rows = await buildRankingExportRows(candidates);
  const worksheetData = [
    ['TalentLens AI Ranked Candidate Output'],
    [],
    RANKING_EXPORT_COLUMNS,
    ...rows.map(row => RANKING_EXPORT_COLUMNS.map(column => row[column] ?? ''))
  ];
  const worksheet = XLSX.utils.aoa_to_sheet(worksheetData);
  const workbook = XLSX.utils.book_new();
  workbook.Props = {
    Title: 'TalentLens AI Ranked Candidate Output',
    Subject: 'Ranked candidate export',
    Author: 'TalentLens AI',
    CreatedDate: new Date()
  };

  applyRankingWorkbookFormatting(worksheet, worksheetData, rows.length);
  XLSX.utils.book_append_sheet(workbook, worksheet, 'TalentLens Rankings');
  return workbook;
}

async function buildRankingExportRows(candidates) {
  const rows = [];
  for (let index = 0; index < candidates.length; index += 1) {
    rows.push(mapCandidateToExportRow(candidates[index], index));
    if (index > 0 && index % 200 === 0) await waitForExportFrame();
  }
  return rows;
}

function mapCandidateToExportRow(candidate, index) {
  return {
    'Rank': index + 1,
    'Candidate ID': getExportValue(candidate.candidate_id || candidate.candidateId || candidate.id),
    'Candidate Name': getExportValue(candidate.name || candidate.displayName || candidate.candidate_name),
    'Current Role': getExportValue(getCandidateHeadline(candidate) || candidate.role || candidate.profileLabel),
    'Experience': getExportValue(getCandidateExperienceSummary(candidate) || candidate.experienceSummary || candidate.experience),
    'Final Score': getExportNumber(candidate.finalScore ?? candidate.final_score),
    'Technical Score': getExportNumber(candidate.technicalScore ?? candidate.technical_fit_score ?? candidate.technical_score),
    'Experience Score': getExportNumber(candidate.experienceScore ?? candidate.experience_score),
    'Semantic Score': getExportNumber(candidate.semanticSimilarityScore ?? candidate.semantic_similarity_score),
    'Behavioral Score': getExportNumber(candidate.behavioralScore ?? candidate.behavioral_score),
    'Authenticity Score': getExportNumber(candidate.authenticityScore ?? candidate.authenticity_score),
    'Cognitive Twin Score': getExportNumber(candidate.cognitiveTwinScore ?? candidate.recruiter_cognitive_twin_score),
    'Hidden Gem (Yes/No)': candidate.hiddenGem || candidate.hidden_gem_flag ? 'Yes' : 'No',
    'Matched Skills': joinExportList(candidate.matchedSkills || candidate.matched_skills),
    'Missing Skills': joinExportList(candidate.missingSkills || candidate.missing_skills || getScoreBreakdownList(candidate, 'gaps')),
    'Strengths': joinExportList(candidate.strengths || candidate.candidate_strengths),
    'Weaknesses': joinExportList(candidate.weaknesses || candidate.risks || candidate.candidate_risks),
    'Recommendation': getExportValue(candidate.interviewRecommendation || candidate.interview_recommendation || candidate.recommendation || getRecruiterDecision(candidate)),
    'Why Ranked': getExportValue(candidate.whyRanked || candidate.why_ranked || candidate.searchReason || candidate.search_reason)
  };
}

function getScoreBreakdownList(candidate, key) {
  const breakdown = candidate.scoreBreakdown || candidate.score_breakdown || {};
  const values = [];
  Object.values(breakdown).forEach(section => {
    if (section && Array.isArray(section[key])) values.push(...section[key]);
  });
  return values;
}

function applyRankingWorkbookFormatting(worksheet, worksheetData, candidateCount) {
  const range = XLSX.utils.decode_range(worksheet['!ref']);
  const titleRow = 0;
  const headerRow = 2;
  const firstDataRow = 3;
  const lastDataRow = firstDataRow + candidateCount - 1;
  const finalScoreColumn = RANKING_EXPORT_COLUMNS.indexOf('Final Score');
  const hiddenGemColumn = RANKING_EXPORT_COLUMNS.indexOf('Hidden Gem (Yes/No)');
  const centeredColumns = new Set([
    RANKING_EXPORT_COLUMNS.indexOf('Rank'),
    finalScoreColumn,
    RANKING_EXPORT_COLUMNS.indexOf('Technical Score'),
    RANKING_EXPORT_COLUMNS.indexOf('Experience Score'),
    RANKING_EXPORT_COLUMNS.indexOf('Semantic Score'),
    RANKING_EXPORT_COLUMNS.indexOf('Behavioral Score'),
    RANKING_EXPORT_COLUMNS.indexOf('Authenticity Score'),
    RANKING_EXPORT_COLUMNS.indexOf('Cognitive Twin Score'),
    hiddenGemColumn
  ]);

  worksheet['!merges'] = [{ s: { r: titleRow, c: 0 }, e: { r: titleRow, c: RANKING_EXPORT_COLUMNS.length - 1 } }];
  worksheet['!cols'] = getExportColumnWidths(worksheetData);
  worksheet['!rows'] = [
    { hpt: 28 },
    { hpt: 6 },
    { hpt: 24 },
    ...Array.from({ length: candidateCount }, () => ({ hpt: 32 }))
  ];
  worksheet['!autofilter'] = {
    ref: `A${headerRow + 1}:${XLSX.utils.encode_col(RANKING_EXPORT_COLUMNS.length - 1)}${Math.max(headerRow + 1, lastDataRow + 1)}`
  };
  worksheet['!freeze'] = { xSplit: 0, ySplit: 3, topLeftCell: 'A4', activePane: 'bottomLeft', state: 'frozen' };

  styleWorksheetCell(worksheet, titleRow, 0, {
    font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 16 },
    fill: { patternType: 'solid', fgColor: { rgb: '141824' } },
    alignment: { horizontal: 'left', vertical: 'center' }
  });

  for (let columnIndex = 0; columnIndex <= range.e.c; columnIndex += 1) {
    styleWorksheetCell(worksheet, headerRow, columnIndex, {
      font: { bold: true, color: { rgb: 'FFFFFF' } },
      fill: { patternType: 'solid', fgColor: { rgb: '6C4DFF' } },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
      border: getExportBorderStyle()
    });
  }

  for (let rowIndex = firstDataRow; rowIndex <= lastDataRow; rowIndex += 1) {
    const isAlternate = (rowIndex - firstDataRow) % 2 === 1;
    for (let columnIndex = 0; columnIndex <= range.e.c; columnIndex += 1) {
      const cellRef = XLSX.utils.encode_cell({ r: rowIndex, c: columnIndex });
      const cell = worksheet[cellRef];
      if (!cell) continue;
      const baseFill = isAlternate ? 'F4F6FB' : 'FFFFFF';
      cell.s = {
        font: { color: { rgb: '172033' } },
        fill: { patternType: 'solid', fgColor: { rgb: baseFill } },
        alignment: {
          horizontal: centeredColumns.has(columnIndex) ? 'center' : 'left',
          vertical: 'center',
          wrapText: !centeredColumns.has(columnIndex)
        },
        border: getExportBorderStyle()
      };

      if (centeredColumns.has(columnIndex) && typeof cell.v === 'number') {
        cell.z = '0.0';
      }
      if (columnIndex === finalScoreColumn) {
        cell.s.fill = { patternType: 'solid', fgColor: { rgb: getFinalScoreFill(cell.v) } };
        cell.s.font = { bold: true, color: { rgb: '172033' } };
      }
      if (columnIndex === hiddenGemColumn) {
        const isGem = String(cell.v || '').toLowerCase() === 'yes';
        cell.s.fill = { patternType: 'solid', fgColor: { rgb: isGem ? 'DDF8EA' : 'E7EAF0' } };
        cell.s.font = { bold: true, color: { rgb: isGem ? '047857' : '5B6472' } };
      }
    }
  }
}

function getExportColumnWidths(worksheetData) {
  return RANKING_EXPORT_COLUMNS.map((column, columnIndex) => {
    const maxLength = worksheetData.reduce((max, row) => {
      const value = row[columnIndex] == null ? '' : String(row[columnIndex]);
      return Math.max(max, value.length);
    }, column.length);
    return { wch: Math.min(Math.max(maxLength + 2, 12), columnIndex >= 13 ? 42 : 26) };
  });
}

function styleWorksheetCell(worksheet, rowIndex, columnIndex, style) {
  const cellRef = XLSX.utils.encode_cell({ r: rowIndex, c: columnIndex });
  if (!worksheet[cellRef]) worksheet[cellRef] = { t: 's', v: '' };
  worksheet[cellRef].s = style;
}

function getExportBorderStyle() {
  return {
    top: { style: 'thin', color: { rgb: 'D9DDEA' } },
    right: { style: 'thin', color: { rgb: 'D9DDEA' } },
    bottom: { style: 'thin', color: { rgb: 'D9DDEA' } },
    left: { style: 'thin', color: { rgb: 'D9DDEA' } }
  };
}

function getFinalScoreFill(value) {
  const score = Number(value);
  if (score >= 88) return 'CFF7DF';
  if (score >= 75) return 'E4DEFF';
  if (score > 0) return 'FFF1C7';
  return 'F0F2F6';
}

function getExportDateStamp() {
  return new Date().toISOString().slice(0, 10);
}

function getExportValue(value) {
  if (value == null) return '';
  return String(value).trim();
}

function getExportNumber(value) {
  if (value == null || value === '') return '';
  const numberValue = Number(value);
  return Number.isFinite(numberValue) ? numberValue : '';
}

function joinExportList(value) {
  if (Array.isArray(value)) {
    return value.map(item => String(item || '').trim()).filter(Boolean).join(', ');
  }
  if (value == null) return '';
  return String(value).trim();
}

function waitForExportFrame() {
  return new Promise(resolve => {
    if (window.requestIdleCallback) {
      window.requestIdleCallback(() => resolve(), { timeout: 120 });
    } else if (window.requestAnimationFrame) {
      window.requestAnimationFrame(() => resolve());
    } else {
      setTimeout(resolve, 0);
    }
  });
}

function showTalentLensToast(message, type = 'info') {
  let region = document.getElementById('talentToastRegion');
  if (!region) {
    region = document.createElement('div');
    region.id = 'talentToastRegion';
    region.className = 'talent-toast-region';
    region.setAttribute('aria-live', 'polite');
    document.body.appendChild(region);
  }

  const toast = document.createElement('div');
  toast.className = `talent-toast talent-toast-${type}`;
  toast.textContent = String(message || '');
  region.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('is-visible'));
  setTimeout(() => {
    toast.classList.remove('is-visible');
    setTimeout(() => toast.remove(), 180);
  }, 3600);
}

function renderTable(data) {
  const tbody = document.getElementById('candidateTableBody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="padding:24px;color:var(--text-secondary);text-align:center;">No ranked candidates available. Open Analyze Role and run the backend ranking first.</td></tr>`;
    updateSummary(data);
    return;
  }
  tbody.innerHTML = data.map((c, i) => `
    <tr>
      <td><div class="rank-badge ${i === 0 ? 'top' : ''}">${i + 1}</div></td>
      <td>
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="avatar avatar-sm" style="background:${c.gradient};">${c.initials}</div>
          <div>
            <div style="font-weight:700;">${c.name} ${c.hiddenGem ? '<span class="gem-badge" style="font-size:10px;padding:3px 8px;">Gem</span>' : ''}</div>
            <div style="font-size:12px;color:var(--text-muted);">${getCandidateHeadline(c)} · ${c.location}</div>
          </div>
        </div>
      </td>
      <td>
        <div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">
          <strong style="color:var(--text-primary);">${getCandidateEducationSummary(c) || 'Candidate Profile'}</strong><br/>
          ${getCandidateExperienceSummary(c)}<br/>
          ${(c.skills || []).slice(0,4).map(skill => `<span class="tag tag-skill">${skill}</span>`).join('')}
        </div>
      </td>
      <td>${scorePill(c.finalScore)}</td>
      <td>${scorePill(c.technicalScore)}</td>
      <td>${scorePill(c.experienceScore)}</td>
      <td>${scorePill(c.cognitiveTwinScore)}</td>
      <td><span class="badge ${c.source === 'User Added' ? 'badge-electric' : 'badge-blue'}">${c.source}</span></td>
      <td style="color:var(--text-secondary);font-size:13px;">${c.searchReason}</td>
      <td><button class="btn btn-secondary btn-sm" onclick="openSidebar('${c.id}')">View Card</button></td>
    </tr>
  `).join('');
  updateSummary(data);
}

function filterCandidates() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const skill = document.getElementById('filterSkill').value;
  const source = document.getElementById('filterSource').value;
  const expRange = document.getElementById('filterExp').value;
  let data = [...activeRankings];
  if (q) data = data.filter(c => `${c.name} ${getCandidateHeadline(c)} ${c.company}`.toLowerCase().includes(q));
  if (skill) data = data.filter(c => c.skills.includes(skill));
  if (source) data = data.filter(c => c.source === source);
  if (expRange === '0-4') data = data.filter(c => c.experience <= 4);
  if (expRange === '4-7') data = data.filter(c => c.experience > 4 && c.experience <= 7);
  if (expRange === '7+') data = data.filter(c => c.experience > 7);
  if (gemOnly) data = data.filter(c => c.hiddenGem);
  renderTable(data);
}

function toggleGemFilter() {
  gemOnly = !gemOnly;
  document.getElementById('gemToggle').classList.toggle('active', gemOnly);
  filterCandidates();
}

function openSidebar(id) {
  const c = activeRankings.find(x => String(x.id) === String(id));
  if (!c) return;
  document.getElementById('sidebarContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
      <div class="avatar avatar-lg" style="background:${c.gradient};">${c.initials}</div>
      <div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;">${c.name}</div>
        <div style="color:var(--text-muted);font-size:14px;">${getCandidateHeadline(c)}</div>
        <div style="margin-top:8px;"><span class="badge ${c.source === 'User Added' ? 'badge-electric' : 'badge-blue'}">${c.source}</span></div>
      </div>
    </div>
    <div class="grid-2" style="gap:12px;margin-bottom:18px;">
      <div class="glass stat-card"><div class="stat-label">Final</div><div class="stat-value">${c.finalScore}</div></div>
      <div class="glass stat-card"><div class="stat-label">Twin</div><div class="stat-value">${c.cognitiveTwinScore}</div></div>
    </div>
    <div class="field-label" style="font-size:12px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;">Matched skills</div>
    <div style="margin-bottom:18px;">${(c.matchedSkills || []).map(s => `<span class="tag tag-skill">${s}</span>`).join('') || '<span class="tag tag-exp">Adjacent match</span>'}</div>
    <div class="field-label" style="font-size:12px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;">Extracted profile</div>
    <div style="color:var(--text-secondary);font-size:14px;line-height:1.7;margin-bottom:18px;">
      Education: ${getCandidateEducationSummary(c) || 'Candidate Profile'}<br/>
      College: ${c.college || ''}<br/>
      Experience: ${getCandidateExperienceSummary(c)}<br/>
      Skills: ${(c.skills || []).join(', ')}
    </div>
    <div class="divider"></div>
    <p style="color:var(--text-secondary);font-size:14px;line-height:1.7;">${c.whyRanked}</p>
    <p style="color:var(--text-secondary);font-size:14px;line-height:1.7;margin-top:12px;">${c.recruiterReasoning}</p>
  `;
  document.getElementById('sidebarOverlay').classList.add('open');
}

function closeSidebar(event) {
  if (event.target === document.getElementById('sidebarOverlay')) document.getElementById('sidebarOverlay').classList.remove('open');
}

populateSkillFilter();
initCustomFilterDropdowns();
renderTable(activeRankings);
</script>
</body>
</html>
